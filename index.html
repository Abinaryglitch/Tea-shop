<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bothina's Tea Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
:root{
  --ink:#2d211a;
  --paper:#fff2d1;
  --paper2:#ffe4b1;
  --wood:#5b3827;
  --wood2:#7c5032;
  --leaf:#6f9253;
  --gold:#d8a64d;
  --rose:#c47b70;
  --night:#172616;
}
body{
  margin:0;
  min-height:100vh;
  font-family:"Press Start 2P",cursive;
  color:var(--ink);
  background:
    repeating-linear-gradient(0deg,#18301e 0px,#18301e 16px,#0e0b08 16px,#0e0b08 32px),
    repeating-linear-gradient(90deg,#1a2818 0px,#1a2818 16px,#0e0b08 16px,#0e0b08 32px);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow-x:hidden;
  image-rendering:pixelated;
}
.scene{
  width:min(1100px,96vw);
  min-height:720px;
  margin:18px;
  border:8px solid #2b1b14;
  border-radius:0px;
  position:relative;
  overflow:hidden;
  background:
    repeating-linear-gradient(90deg,#765034 0 16px,#67432e 16px 32px),
    repeating-linear-gradient(0deg,#6d4c38 0 16px,#58392e 16px 32px);
  box-shadow:inset -4px -4px 0 rgba(0,0,0,.5), inset 4px 4px 0 rgba(255,255,255,.1), 12px 12px 0 rgba(0,0,0,.6);
  image-rendering:pixelated;
}
.scene:before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(0deg,transparent 0 32px,rgba(53,95,53,.15) 32px 48px),
    repeating-linear-gradient(90deg,transparent 0 48px,rgba(37,61,35,.12) 48px 64px);
  opacity:1;
  z-index:1;
}
.lantern{
  position:absolute;
  top:18px;
  width:32px;
  height:48px;
  border:4px solid #2b1b14;
  border-radius:0px;
  background:#ffd700;
  box-shadow:inset -2px -2px 0 #c49000, inset 2px 2px 0 #ffff99, 0 0 0 2px #2b1b14;
  z-index:3;
  animation:bobbing 2s ease-in-out infinite;
  image-rendering:pixelated;
}
.l1{left:95px}.l2{right:115px;animation-delay:.5s}
.lantern:before{
  content:"";
  position:absolute;
  top:-20px;
  left:50%;
  width:4px;
  height:20px;
  background:#2b1b14;
  transform:translateX(-2px);
}
@keyframes bobbing{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}
.sign{
  position:absolute;
  top:52px;
  left:50%;
  transform:translateX(-50%);
  z-index:4;
  background:#8b5a2b;
  color:#fff1d1;
  border:4px solid #2b1b14;
  border-radius:0px;
  padding:12px 28px;
  box-shadow:inset -2px -2px 0 #5a3a1b, inset 2px 2px 0 #b88a3b, 4px 4px 0 #2b1b14;
  image-rendering:pixelated;
}
.sign h1{
  margin:0;
  font-family:"Press Start 2P",cursive;
  font-size:clamp(1.5rem,5vw,2.5rem);
  line-height:1.2;
  letter-spacing:2px;
}
.shelf{
  position:absolute;
  right:40px;
  top:175px;
  width:360px;
  min-height:210px;
  z-index:2;
  border:6px solid #3a241a;
  border-radius:0px;
  background:#5a3a2a;
  padding:16px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  box-shadow:inset -3px -3px 0 #2a1a1a, inset 3px 3px 0 #8a5a4a;
  image-rendering:pixelated;
}
.jar{
  height:70px;
  border:4px solid #2b1b14;
  border-radius:0px;
  background:#f5e6d3;
  display:grid;
  place-items:center;
  font-size:2rem;
  cursor:pointer;
  transition:none;
  box-shadow:inset -2px -2px 0 #8b7355, inset 2px 2px 0 #ffffcc;
  image-rendering:pixelated;
}
.jar:active{
  box-shadow:inset -2px -2px 0 #ffffcc, inset 2px 2px 0 #8b7355;
  transform:translateY(2px);
}
.counter{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:190px;
  background:
    repeating-linear-gradient(90deg,#5a4a38 0 16px,#4a3a28 16px 32px);
  border-top:6px solid #2b1b14;
  z-index:3;
  box-shadow:inset 0 4px 0 rgba(255,255,255,.1);
}
.character{
  position:absolute;
  left:95px;
  bottom:100px;
  width:240px;
  height:280px;
  z-index:5;
  filter:none;
  image-rendering:pixelated;
}
.hijab{
  position:absolute;
  left:40px;
  top:0px;
  width:160px;
  height:120px;
  background:#5a6a7a;
  border:4px solid #2a2a2a;
  border-radius:0px;
  box-shadow:inset -3px -3px 0 #3a4a5a, inset 3px 3px 0 #8abaaa;
}
.face{
  position:absolute;
  left:60px;
  top:90px;
  width:120px;
  height:100px;
  background:#c9956a;
  border:4px solid #2a2a2a;
  border-radius:0px;
  box-shadow:inset -2px -2px 0 #8a5a4a, inset 2px 2px 0 #f5d5b8;
}
.eye{
  position:absolute;
  top:30px;
  width:16px;
  height:20px;
  background:#1a1a1a;
  border:2px solid #1a1a1a;
  border-radius:0px;
}
.eye:after{
  content:"";
  position:absolute;
  width:6px;
  height:8px;
  background:#ffffff;
  top:2px;
  left:2px;
}
.eye.left{left:28px}.eye.right{right:28px}
.blush{
  position:absolute;
  top:50px;
  width:16px;
  height:8px;
  background:#d87a6a;
  border-radius:0px;
}
.blush.left{left:20px}.blush.right{right:20px}
.smile{
  position:absolute;
  left:40px;
  top:70px;
  width:40px;
  height:4px;
  background:#1a1a1a;
}
.body{
  position:absolute;
  left:24px;
  top:180px;
  width:192px;
  height:80px;
  background:#4a7a46;
  border:4px solid #2a2a2a;
  border-radius:0px;
  box-shadow:inset -2px -2px 0 #2a5a22, inset 2px 2px 0 #8aaada;
}
.apron{
  position:absolute;
  left:80px;
  top:185px;
  width:80px;
  height:100px;
  background:#f5d5a8;
  border:4px solid #2a2a2a;
  border-radius:0px;
  display:grid;
  place-items:center;
  font-size:2rem;
  box-shadow:inset -2px -2px 0 #c9956a, inset 2px 2px 0 #fffaec;
}
.speech{
  position:absolute;
  left:320px;
  top:210px;
  width:330px;
  min-height:120px;
  z-index:6;
  background:var(--paper);
  border:4px solid #2a2a2a;
  border-radius:0px;
  padding:16px 18px;
  font-family:"Press Start 2P",cursive;
  font-size:0.85rem;
  line-height:1.4;
  box-shadow:inset -2px -2px 0 #c9956a, inset 2px 2px 0 #fffaec, 4px 4px 0 #2a2a2a;
  word-wrap:break-word;
  overflow-wrap:break-word;
  image-rendering:pixelated;
}
.speech:before{
  content:"";
  position:absolute;
  left:-16px;
  top:50px;
  width:16px;
  height:16px;
  background:var(--paper);
  border-left:4px solid #2a2a2a;
  border-bottom:4px solid #2a2a2a;
  border-radius:0px;
}
.panel{
  position:absolute;
  right:58px;
  bottom:45px;
  width:390px;
  min-height:250px;
  z-index:7;
  background:#fff2d1;
  border:4px solid #2a2a2a;
  border-radius:0px;
  padding:18px;
  box-shadow:inset -3px -3px 0 #c9956a, inset 3px 3px 0 #fffaec, 4px 4px 0 #2a2a2a;
  image-rendering:pixelated;
}
h2{
  font-family:"Press Start 2P",cursive;
  font-size:1.2rem;
  line-height:1.2;
  margin:0 0 10px;
  letter-spacing:1px;
}
p{
  line-height:1.5;
  font-size:0.75rem;
  margin:8px 0;
}
button{
  width:100%;
  margin-top:10px;
  padding:10px 14px;
  font-family:"Press Start 2P",cursive;
  font-size:0.75rem;
  font-weight:700;
  border:3px solid #2a2a2a;
  border-radius:0px;
  background:#d8a64d;
  color:#251812;
  box-shadow:inset -2px -2px 0 #a87a2d, inset 2px 2px 0 #fffaec, 3px 3px 0 #2a2a2a;
  cursor:pointer;
  transition:none;
  letter-spacing:1px;
  image-rendering:pixelated;
}
button:active{
  box-shadow:inset -2px -2px 0 #fffaec, inset 2px 2px 0 #a87a2d, 1px 1px 0 #2a2a2a;
  transform:translateY(2px) translateX(1px);
}
.answers{display:grid;gap:8px}
.answers button{text-align:left;background:#fff7e6}
.topline{
  display:flex;
  justify-content:space-between;
  font-weight:700;
  font-size:0.7rem;
  margin-bottom:8px;
  letter-spacing:1px;
}
.catchbox{
  height:245px;
  border:4px solid #2a2a2a;
  border-radius:0px;
  background:linear-gradient(180deg,#2a4a36 0%,#1a2a20 50%,#0a1a10 100%);
  overflow:hidden;
  position:relative;
  box-shadow:inset -2px -2px 0 #0a0a0a, inset 2px 2px 0 #5a8a6a;
}
.falling{
  position:absolute;
  top:-40px;
  font-size:30px;
  animation:pixelDrop 3s steps(30,end) forwards;
  user-select:none;
  image-rendering:pixelated;
}
@keyframes pixelDrop{
  to{
    top:285px;
    transform:rotate(250deg);
  }
}
.reward{
  position:absolute;
  left:380px;
  top:350px;
  width:330px;
  z-index:9;
  background:#fff7e6;
  border:4px double #2a2a2a;
  border-radius:0px;
  padding:16px;
  box-shadow:inset -3px -3px 0 #c9956a, inset 3px 3px 0 #fffaec, 4px 4px 0 #2a2a2a;
  image-rendering:pixelated;
}
.teaName{
  font-family:"Press Start 2P",cursive;
  font-size:1.1rem;
  margin:4px 0;
  letter-spacing:1px;
}
.tag{
  display:inline-block;
  padding:4px 10px;
  border-radius:0px;
  background:#55335a;
  color:#fff2d1;
  font-weight:700;
  border:2px solid #2a2a2a;
  font-family:"Press Start 2P",cursive;
  font-size:0.6rem;
  letter-spacing:1px;
  box-shadow:2px 2px 0 #2a2a2a;
}
.tiny{
  position:absolute;
  z-index:8;
  width:auto;
  padding:8px 10px;
  border-radius:0px;
  font-size:1rem;
  border:3px solid #2a2a2a;
  background:#fff2d1cc;
  box-shadow:inset -2px -2px 0 #c9956a, inset 2px 2px 0 #fffaec, 3px 3px 0 #2a2a2a;
  font-family:"Press Start 2P",cursive;
  cursor:pointer;
  transition:none;
  image-rendering:pixelated;
}
.tiny:active{
  box-shadow:inset -2px -2px 0 #fffaec, inset 2px 2px 0 #c9956a, 1px 1px 0 #2a2a2a;
  transform:translateY(1px) translateX(1px);
}
.dragon{right:430px;bottom:160px}
.book{right:38px;top:405px}
.ending{
  position:absolute;
  left:0;right:0;bottom:8px;
  z-index:8;
  text-align:center;
  font-family:"Press Start 2P",cursive;
  color:#fff2d1;
  text-shadow:2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
  font-size:0.65rem;
  margin:0;
  letter-spacing:1px;
}
.hidden{display:none!important}
.leaf{
  position:absolute;
  top:-35px;
  z-index:10;
  font-size:20px;
  opacity:.8;
  animation:pixelLeafFall linear forwards;
  pointer-events:none;
  image-rendering:pixelated;
}
@keyframes pixelLeafFall{
  to{
    transform:translateY(760px) rotate(340deg);
    opacity:0;
  }
}
@media(max-width:800px){
  body{align-items:flex-start}
  .scene{min-height:900px;margin:10px;width:96vw}
  .sign{top:22px;width:86%;text-align:center}
  .lantern{display:none}
  .shelf{right:5%;top:145px;width:90%;grid-template-columns:repeat(4,1fr);min-height:auto}
  .jar{height:50px;font-size:1.55rem}
  .character{left:24px;bottom:280px;transform:scale(.75);transform-origin:bottom left}
  .speech{
    left:42%;
    top:385px;
    width:52%;
    font-size:0.7rem;
    padding:12px;
  }
  .panel{
    left:5%;
    right:5%;
    bottom:55px;
    width:90%;
  }
  .reward{
    left:5%;
    right:5%;
    top:auto;
    bottom:55px;
    width:90%;
  }
  .dragon{right:22px;bottom:305px}
  .book{right:18px;top:330px}
}
</style>
</head>

<body>
<main class="scene">
  <div class="lantern l1"></div>
  <div class="lantern l2"></div>

  <div class="sign"><h1>BOTHINA'S TEA</h1></div>

  <div class="shelf">
    <div class="jar">🍓</div><div class="jar">🌙</div><div class="jar">🍯</div><div class="jar">🍄</div>
    <div class="jar">🫐</div><div class="jar">🌿</div><div class="jar">✨</div><div class="jar">🍵</div>
  </div>

  <div class="character">
    <div class="hijab"></div>
    <div class="face">
      <div class="eye left"></div><div class="eye right"></div>
      <div class="blush left"></div><div class="blush right"></div>
      <div class="smile"></div>
    </div>
    <div class="body"></div>
    <div class="apron">☕</div>
  </div>

  <div class="speech" id="speech">
    HI! I'M BOTHINA<br>
    WIN AND BREW TEA
  </div>

  <section class="panel" id="home">
    <h2>CHOOSE</h2>
    <p>PICK CHALLENGE WIN TEA</p>
    <button onclick="startQuiz()">GUESS TEA</button>
    <button onclick="startCatcher()">CATCH!</button>
  </section>

  <section class="panel hidden" id="quiz">
    <div class="topline">
      <span id="quizRound"></span>
      <span id="quizScore"></span>
    </div>
    <h2 id="question" style="font-size:0.9rem;"></h2>
    <div class="answers" id="answers"></div>
  </section>

  <section class="panel hidden" id="catcher">
    <div class="topline">
      <span id="timeLeft">TIME:20</span>
      <span id="catchScore">SCORE:0</span>
    </div>
    <p>CATCH: 🍃🌸🫐✨🍯<br>AVOID: 🐸🕷️🔥</p>
    <div class="catchbox" id="catchbox"></div>
    <button onclick="finishCatcher()">BREW!</button>
  </section>

  <section class="reward hidden" id="reward"></section>

  <button class="tiny dragon" onclick="dragonTalk()">🐉</button>
  <button class="tiny book" onclick="journalTalk()">📖</button>

  <div class="counter"></div>
  <p class="ending">KETTLE WARM</p>
</main>

<script>
const teas=[
{name:"Dragon Berry Tea",rarity:"RARE",ingredients:"Dragonberries, wild hibiscus, ember honey.",effect:"Soothes vocal cords. Warms throat."},
{name:"Moonlit Lotus Tea",rarity:"EPIC",ingredients:"Moon lotus petals, silver jasmine, sunrise dew.",effect:"Clears fog. Calm focus."},
{name:"Forest Whisper Tea",rarity:"UNCOMMON",ingredients:"Whisperleaf, pine tips, wild mint, moss sugar.",effect:"Sharpens hearing. Grounds travelers."},
{name:"Frost Fern Tea",rarity:"RARE",ingredients:"Frost fern, snow mint, winter sage, pear peel.",effect:"Cooling sensation. Soothes fever."},
{name:"Fairy Blossom Tea",rarity:"LEGENDARY",ingredients:"Fairy blossoms, chamomile, crystal pollen, honey.",effect:"Deep rest. Body renewal."},
{name:"Blueberry Stardew Tea",rarity:"RARE",ingredients:"Moon blueberries, lavender, oatflower, clover honey.",effect:"Stomach comfort. Eases anxiety."},
{name:"Beginner's Blend",rarity:"COMMON",ingredients:"Mint, chamomile, honey, brave leaf.",effect:"Gentle. Every traveler welcome."}
];

const questions=[
{q:"Which tea helps a bard's tired vocal cords?",correct:"Dragon Berry Tea",options:["Dragon Berry Tea","Frost Fern Tea","Moonlit Lotus Tea","Forest Whisper Tea"]},
{q:"Which tea opens under moonlight?",correct:"Moonlit Lotus Tea",options:["Fairy Blossom Tea","Beginner's Blend","Moonlit Lotus Tea","Dragon Berry Tea"]},
{q:"Which ingredient needs permission?",correct:"Fairy blossom petals",options:["Fairy blossom petals","Snow mint","Pine tips","Dragonberries"]},
{q:"Which cools an overheated traveler?",correct:"Frost Fern Tea",options:["Moonlit Lotus Tea","Frost Fern Tea","Beginner's Blend","Dragon Berry Tea"]},
{q:"Which grounds travelers?",correct:"Forest Whisper Tea",options:["Forest Whisper Tea","Fairy Blossom Tea","Frost Fern Tea","Beginner's Blend"]}
];

let qi=0,qs=0,cs=0,time=20,timer,spawner;
const $=id=>document.getElementById(id);

function show(id){
  ["home","quiz","catcher"].forEach(x=>$(x).classList.toggle("hidden",x!==id));
  $("reward").classList.add("hidden");
}

function startQuiz(){
  qi=0;qs=0;
  $("speech").innerHTML="CHOOSE<br>CAREFULLY";
  show("quiz");
  nextQ();
}

function nextQ(){
  let item=questions[qi];
  $("quizRound").textContent=`Q${qi+1}/${questions.length}`;
  $("quizScore").textContent=`SCORE:${qs}`;
  $("question").textContent=item.q;
  $("answers").innerHTML="";
  item.options.forEach(op=>{
    let b=document.createElement("button");
    b.textContent=op;
    b.onclick=()=>{
      if(op===item.correct)qs++;
      qi++;
      if(qi>=questions.length)brew(qs>=3);
      else nextQ();
    };
    $("answers").appendChild(b);
  });
}

function startCatcher(){
  cs=0;time=20;
  $("catchbox").innerHTML="";
  $("speech").innerHTML="CATCH GOOD<br>NO FROGS!";
  show("catcher");
  updateCatch();
  clearInterval(timer);clearInterval(spawner);
  timer=setInterval(()=>{
    time--;updateCatch();
    if(time<=0)finishCatcher();
  },1000);
  spawner=setInterval(spawn,650);
}

function updateCatch(){
  $("timeLeft").textContent=`TIME:${time}`;
  $("catchScore").textContent=`SCORE:${cs}`;
}

function spawn(){
  const good=["🍃","🌸","🫐","✨","🍯"],bad=["🐸","🕷️","🔥"];
  const ok=Math.random()>.28;
  let s=document.createElement("span");
  s.className="falling";
  s.textContent=ok?good[Math.floor(Math.random()*good.length)]:bad[Math.floor(Math.random()*bad.length)];
  s.style.left=Math.random()*88+"%";
  s.onclick=()=>{
    cs+=ok?1:-2;
    if(cs<0)cs=0;
    updateCatch();
    s.remove();
  };
  $("catchbox").appendChild(s);
  setTimeout(()=>s.remove(),3100);
}

function finishCatcher(){
  clearInterval(timer);clearInterval(spawner);
  brew(cs>=12);
}

function brew(won){
  show("home");
  const tea=won?teas[Math.floor(Math.random()*(teas.length-1))]:teas[teas.length-1];
  let saved=JSON.parse(localStorage.getItem("bothinaTeas")||"[]");
  if(!saved.includes(tea.name)){saved.push(tea.name);localStorage.setItem("bothinaTeas",JSON.stringify(saved));}
  $("speech").innerHTML=won?"YOU WON<br>SPECIAL TEA":"KEEP TRY<br>TEA WAITS";
  $("reward").innerHTML=`
    <span class="tag">${tea.rarity}</span>
    <div class="teaName">🍵 ${tea.name}</div>
    <p><b>INGREDIENTS</b><br>${tea.ingredients}</p>
    <p><b>EFFECT</b><br>${tea.effect}</p>
    <p><b>JOURNAL</b><br>FOUND: ${saved.length} TEA${saved.length===1?"":"S"}</p>
    <button onclick="startQuiz()">PLAY QUIZ</button>
    <button onclick="startCatcher()">PLAY CATCH</button>
  `;
  $("reward").classList.remove("hidden");
}

function dragonTalk(){
  const lines=["PIP INNOCENT","PIP CRUMBS","PIP DREAMS HONEY","PIP GUARDS"];
  $("speech").textContent=lines[Math.floor(Math.random()*lines.length)];
}

function journalTalk(){
  let saved=JSON.parse(localStorage.getItem("bothinaTeas")||"[]");
  $("speech").textContent=saved.length?`JOURNAL: ${saved.length} TEA${saved.length===1?"":"S"}`:"JOURNAL EMPTY";
}

document.querySelectorAll(".jar").forEach(j=>{
  j.onclick=()=>{
    const lines=["KETTLE SINGS","PERMISSION ONLY","MUSHROOMS FIGHT","LIKE BERRIES","DRAGON WATCHES"];
    $("speech").textContent=lines[Math.floor(Math.random()*lines.length)];
  };
});

function leaf(){
  let l=document.createElement("span");
  l.className="leaf";
  l.textContent=["🍃","🍂","✨"][Math.floor(Math.random()*3)];
  l.style.left=Math.random()*100+"%";
  l.style.animationDuration=(5+Math.random()*5)+"s";
  document.querySelector(".scene").appendChild(l);
  setTimeout(()=>l.remove(),9000);
}
setInterval(leaf,900);
</script>
</body>
</html>
